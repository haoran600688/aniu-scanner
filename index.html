<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aniu Home Ai 智能仓储</title>
    <!-- 引入纯 Web 扫码库 -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>if(typeof Html5Qrcode === "undefined") console.error("html5-qrcode library NOT loaded!");</script>
    <script>
    

        // --- 扫码核心逻辑 ---
        function startScanner(target) {
            console.log("开始扫码, target:", target);
            currentScanTarget = target;
            document.getElementById('reader-container').style.display = 'block';
            document.getElementById('scanSkuBtn').style.display = 'none';
            
            // Check if html5QrCode is available
            if (typeof Html5Qrcode === 'undefined') {
                alert("扫码库未加载，请刷新页面或检查网络连接");
                document.getElementById('reader-container').style.display = 'none';
                document.getElementById('scanSkuBtn').style.display = 'block';
                return;
            }
            
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            
            console.log("启动摄像头...");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess, onScanFailure
            ).catch(err => {
                alert("无法启动摄像头，请允许访问相机");
                stopScanner();
            });
        }
        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').style.display = 'none';
                    document.getElementById('scanSkuBtn').style.display = 'block';
                }).catch(err => console.log(err));
            } else {
                document.getElementById('reader-container').style.display = 'none';
                document.getElementById('scanSkuBtn').style.display = 'block';
            }
        }
        try {
            document.getElementById('scanSkuBtn').onclick = () => startScanner('sku');
            document.getElementById('scanBinBtn').onclick = () => startScanner('bin');
            document.getElementById('cancelScanBtn').onclick = () => stopScanner();
            console.log('扫码按钮绑定成功');
        } catch(e) {
            console.error('扫码按钮绑定失败:', e);
        }

        function onScanSuccess(decodedText) {
            if (currentScanTarget === 'sku') {
                currentSku = decodedText;
                document.getElementById('sku-display').style.display = 'block';
                document.getElementById('sku-display').innerText = "✅ 识别商品: " + currentSku;
                document.getElementById('submitBtn').style.display = 'block';
            } else if (currentScanTarget === 'bin') {
                document.getElementById('binLocation').value = decodedText;
            }
            stopScanner();
        }
        function onScanFailure(error) {}

        // 提交
        document.getElementById('submitBtn').onclick = function() {
            if(!currentSku) return alert("请先扫描商品！");
            
            const actionType = document.getElementById('actionType').value;
            const warehouse = document.getElementById('warehouse').value;
            const quantity = document.getElementById('quantity').value;
            const bin = document.getElementById('binLocation').value;
            
            if (actionType === '调拨') {
                const targetWarehouse = document.getElementById('targetWarehouse').value;
                if (warehouse === targetWarehouse) return alert("❌ 调出仓和调入仓不能是同一个！");
                
                document.getElementById('submitBtn').innerText = "正在同步多条记录...";
                // 调拨出库 - 记录到 ERP_Inventory
                const apiKey = "AIzaSyDb3g6a9JjCZymEQzHr1TyC628mXpPz2xo";
                const sheetId = "1kwxS8XIF8Zj9enEBmhBC5QGZNRu_rdUlE9Gn9mPGkuw";
                const now = new Date().toISOString().slice(0,16).replace("T"," ");
                
                Promise.all([
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/ERP_Inventory!A:append?key=${apiKey}&valueInputOption=USER_ENTERED`, {
                        method: 'POST',
                        body: JSON.stringify({ values: [[currentSku, "", warehouse, -quantity, "", now, "调拨出库"]] })
                    }),
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/ERP_Inventory!A:append?key=${apiKey}&valueInputOption=USER_ENTERED`, {
                        method: 'POST',
                        body: JSON.stringify({ values: [[currentSku, "", targetWarehouse, quantity, bin || "", now, "调拨入库"]] })
                    })
                ]).then(() => { successReset(); }).catch(e => { failReset(); });
            } else if (actionType === '查库存') {
                // 查询库存
                checkInventory(currentSku);
            } else {
                document.getElementById('submitBtn').innerText = "正在同步至系统...";
                // 直接写入 ERP_Inventory 表（通过 Google Sheets API）
                const apiKey = "AIzaSyDb3g6a9JjCZymEQzHr1TyC628mXpPz2xo";
                const sheetId = "1kwxS8XIF8Zj9enEBmhBC5QGZNRu_rdUlE9Gn9mPGkuw";
                const now = new Date().toISOString().slice(0,16).replace("T"," ");
                
                // 构造库存记录
                const invData = [[currentSku, "", warehouse, quantity, bin || "", now, "扫码入库"]];
                
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/ERP_Inventory!A:append?key=${apiKey}&valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    body: JSON.stringify({ values: invData })
                })
                .then(() => { successReset(); })
                .catch(e => { failReset(); });
            }
        };

        function successReset() {
            alert("🎉 操作成功！流水记录和库存已实时更新！");
            document.getElementById('submitBtn').innerText = "✅ 确认提交至系统";
            currentSku = "";
            document.getElementById('sku-display').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('quantity').value = "1";
            document.getElementById('binLocation').value = "";
        }
        function failReset() {
            alert("提交失败，请检查网络");
            document.getElementById('submitBtn').innerText = "✅ 确认提交至系统";
        }
</script>
</body>
</html>
